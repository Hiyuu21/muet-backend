<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUET Hub - Reading Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Specific styling for the reading quiz */
        .passage-box {
            background: #ffffff;
            padding: 25px;
            border: 1px solid #d5dbdb;
            border-radius: 8px;
            line-height: 1.8;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 15px;
        }
        .question-block {
            background: #eaf2f8;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid #3498db;
        }
        .question-block h4 {
            margin-top: 0;
            color: #2c3e50;
        }
        .options-list {
            list-style-type: none;
            padding: 0;
        }
        .options-list li {
            margin-bottom: 10px;
        }
        label {
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        #quizResults {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            font-weight: 700;
            text-align: center;
            font-size: 20px;
        }
        .score-perfect { background-color: #d4efdf; color: #27ae60; border: 1px solid #27ae60; }
        .score-good { background-color: #fcf3cf; color: #f39c12; border: 1px solid #f39c12; }
        .score-poor { background-color: #fadbd8; color: #c0392b; border: 1px solid #c0392b; }
    </style>
</head>
<body>

   <div id="nav-placeholder"></div>
    <script src="js/navbar.js"></script>

    <div class="app-container">
        <h1>Dynamic Reading Practice</h1>
        <p>This passage and quiz were generated by AI directly from a past-year paper.</p>

        <div id="passageContainer" class="passage-box">
            <em>Loading passage from the server...</em>
        </div>

        <form id="quizForm">
            <div id="questionsContainer"></div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" id="submitBtn" class="btn-submit" onclick="gradeQuiz()">Submit Answers</button>
                <button type="button" id="nextBtn" class="btn-submit" onclick="nextQuiz()" style="background-color: #2563eb;">Next Passage ➡️</button>
            </div>
        </form>

        <div id="quizResults"></div>
    </div>

    <script src="js/navbar.js"></script>
    <script>
        let allQuizzes = []; // Will hold the array of quizzes from the database
        let currentQuizIndex = 0; // Tracks which quiz we are looking at
        let correctAnswers = {}; // Tracks answers for the current quiz

        async function loadDynamicQuizzes() {
            try {
                const response = await fetch('http://localhost:3000/all-quizzes');
                if (!response.ok) throw new Error("No quizzes found.");
                
                allQuizzes = await response.json();
                
                if (!allQuizzes || allQuizzes.length === 0) {
                    document.getElementById('passageContainer').innerHTML = "<h2>No quizzes found in the database.</h2>";
                    return;
                }

                // Start by rendering the first quiz in the array
                renderQuiz(0);

            } catch (error) {
                console.error(error);
                document.getElementById('passageContainer').innerHTML = 
                    "<strong style='color:red;'>No quizzes generated yet. Go to the Admin panel and upload a PDF!</strong>";
            }
        }

        function renderQuiz(index) {
            const quizData = allQuizzes[index];
            correctAnswers = {}; 
            
            document.getElementById('quizResults').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('quizForm').reset();

            // Update Header
            document.querySelector('h1').innerText = `Dynamic Reading Practice (${index + 1} of ${allQuizzes.length})`;

            // --- FIX: Clean <br> tags here so it works for new and old files ---
            let cleanPassage = quizData.passage || "";
            if (cleanPassage.includes('<br>')) {
                cleanPassage = cleanPassage.replace(/<br>/g, ' ');
            }
            document.getElementById('passageContainer').innerText = cleanPassage;

            // Build Questions
            const qContainer = document.getElementById('questionsContainer');
            qContainer.innerHTML = '';

            quizData.questions.forEach((q, i) => {
                correctAnswers[q.id] = q.correctAnswer;
                const questionBlock = document.createElement('div');
                questionBlock.className = 'question-block';
                
                let optionsHTML = '';
                q.options.forEach(opt => {
                    const optLetter = opt.trim().charAt(0); 
                    optionsHTML += `
                        <li>
                            <label>
                                <input type="radio" name="${q.id}" value="${optLetter}"> 
                                ${opt}
                            </label>
                        </li>
                    `;
                });

                questionBlock.innerHTML = `
                    <h4>${i + 1}. ${q.text}</h4>
                    <ul class="options-list">
                        ${optionsHTML}
                    </ul>
                `;
                qContainer.appendChild(questionBlock);
            });
        }

        function gradeQuiz() {
            let score = 0;
            const totalQuestions = Object.keys(correctAnswers).length;
            const form = document.getElementById('quizForm');

            for (const [qId, correctLetter] of Object.entries(correctAnswers)) {
                const selectedOption = form.elements[qId]?.value; 
                if (!selectedOption) {
                    alert("Please answer all questions before submitting!");
                    return;
                }
                if (selectedOption === correctLetter) {
                    score++;
                }
            }

            const resultsBox = document.getElementById('quizResults');
            resultsBox.style.display = 'block';
            resultsBox.innerText = `You scored ${score} out of ${totalQuestions}!`;
            resultsBox.style.color = (score === totalQuestions) ? "#16a34a" : "#ef4444";

            // Hide the submit button so they can't double-submit
            document.getElementById('submitBtn').style.display = 'none';

            // Check if there is another quiz in the array
            if (currentQuizIndex < allQuizzes.length - 1) {
                // Show the "Next Passage" button
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                // They finished everything!
                const endMsg = document.createElement('p');
                endMsg.innerText = "🎉 You have completed all available reading practices!";
                endMsg.style.marginTop = "10px";
                endMsg.style.color = "#0f172a";
                resultsBox.appendChild(endMsg);
            }
        }

        // Triggered when the user clicks "Next Passage"
        function nextQuiz() {
            currentQuizIndex++; // Move to the next index
            renderQuiz(currentQuizIndex); // Re-draw the screen
            window.scrollTo(0, 0); // Scroll back to the top of the page
        }

        // Start the engine
        loadDynamicQuizzes();
    </script>
</body>
</html>
